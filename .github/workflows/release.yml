name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          manifest_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$manifest_version" ]]; then
            echo "Tag version '$tag_version' does not match Cargo.toml version '$manifest_version'." >&2
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked --all-targets

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: fswiki-lsp-x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: fswiki-lsp-aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: fswiki-lsp-x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: fswiki-lsp-aarch64-apple-darwin
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            asset: fswiki-lsp-x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset: fswiki-lsp-aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.asset }}.tar.gz" fswiki-lsp

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/fswiki-lsp.exe" -DestinationPath "dist/${{ matrix.asset }}.zip"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download packaged binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum fswiki-lsp-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
